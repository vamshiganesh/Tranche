services:
  mariadb:
    image: mariadb:11.4
    container_name: tranche-mariadb
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tranche}
      MARIADB_USER: ${MARIADB_USER:-tranche}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-tranche}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tranche-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tranche-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:mariadb://mariadb:3306/tranche
      DATABASE_USERNAME: ${MARIADB_USER:-tranche}
      DATABASE_PASSWORD: ${MARIADB_PASSWORD:-tranche}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-key-minimum-32-characters-long}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

volumes:
  mariadb_data:
  redis_data:
