spring:
  application:
    name: tranche

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:mariadb://localhost:3306/tranche}
    username: ${DATABASE_USERNAME:tranche}
    password: ${DATABASE_PASSWORD:tranche}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

tranche:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
  investor:
    default-wallet-balance: ${INVESTOR_DEFAULT_WALLET_BALANCE:0}
    default-currency: USD
  outbox:
    polling-enabled: ${OUTBOX_POLLING_ENABLED:true}
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:30000}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
  rate-limit:
    commitment:
      enabled: ${COMMITMENT_RATE_LIMIT_ENABLED:true}
      requests-per-window: ${COMMITMENT_RATE_LIMIT_REQUESTS:10}
      window: ${COMMITMENT_RATE_LIMIT_WINDOW:1m}
  pagination:
    default-page-size: 20
    max-page-size: 100
  cache:
    opportunity-list-ttl: 60s
    opportunity-detail-ttl: 30s

logging:
  level:
    root: INFO
    com.tranche: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
