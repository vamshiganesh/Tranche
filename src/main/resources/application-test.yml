spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/tranche_test
    username: tranche
    password: tranche

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none

tranche:
  jwt:
    secret: test-jwt-secret-key-minimum-32-characters-long
    expiration-ms: 3600000
  investor:
    demo-credit-enabled: true
  onboarding:
    expose-verification-code: true
  outbox:
    polling-enabled: false
  rate-limit:
    commitment:
      enabled: true
      requests-per-window: 100

logging:
  level:
    root: WARN
    com.tranche: INFO
    org.springframework.test: INFO
    org.testcontainers: INFO

management:
  endpoint:
    health:
      show-details: always
